name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build with Maven
        working-directory: backend
        run: mvn -B -DskipTests package

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: frontend
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: queueflow360
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL to be available..."
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is up"; break
            fi
            sleep 2
          done

      - name: Build backend jar
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: Start backend
        run: |
          echo "Starting backend..."
          nohup java -jar backend/target/queueflow360-backend-0.0.1-SNAPSHOT.jar &

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/v1/auth || true; then
              echo "Backend responded"; break
            fi
            sleep 2
          done

      - name: Smoke test - register user
        run: |
          echo "Registering test user"
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:8080/api/v1/auth/register -H 'Content-Type: application/json' -d '{"email":"ci_test_user@example.com","password":"Test1234","firstName":"CI","lastName":"User"}')
          echo "Response code: $RESP"
          if [ "$RESP" -ne 200 ]; then
            echo "Registration failed with status $RESP"; exit 1
          fi
name: QueueFlow 360 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build and Test Backend with Maven
      working-directory: ./backend
      run: mvn -B package --file pom.xml

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
